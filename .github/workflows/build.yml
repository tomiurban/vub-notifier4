name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Verify APK was created and is signed
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "CHYBA: APK nebol vytvorený!"
            exit 1
          fi
          echo "APK vytvorený, velkost:"
          ls -lh "$APK_PATH"
          echo "--- Kontrola podpisu (apksigner) ---"
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK_PATH"
          if [ $? -ne 0 ]; then
            echo "CHYBA: APK NIE JE správne podpísaný!"
            exit 1
          fi
          echo "✅ APK je správne podpísaný."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VUB-Notifier-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
